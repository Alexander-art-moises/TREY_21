<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feliz Cumpleaños 💖</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff0f7;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      min-height: 100vh;
      width: 100%;
    }
    #prompt p {
      font-size: 16px;
      color: #b05080;
      margin-bottom: 1.2rem;
    }
    #btn {
      font-size: 17px;
      padding: 0.75rem 2.2rem;
      border-radius: 999px;
      background: #e84393;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 4px 18px rgba(232,67,147,0.35);
      transition: transform 0.15s;
    }
    #btn:hover { transform: scale(1.06); }
    #btn:active { transform: scale(0.97); }

    #message {
      display: none;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1s ease forwards;
    }
    #message h1 {
      font-size: 30px;
      font-weight: 700;
      color: #e84393;
      margin-bottom: 0.6rem;
      line-height: 1.35;
    }
    #message p {
      font-size: 16px;
      color: #8a3060;
      max-width: 300px;
      line-height: 1.75;
      margin-bottom: 0.4rem;
    }
    #hearts-row {
      font-size: 30px;
      letter-spacing: 6px;
      margin: 1rem 0;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #replay {
      margin-top: 1.5rem;
      font-size: 13px;
      color: #b05080;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: inherit;
    }
    #replay:hover { color: #e84393; }

    .petal {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      animation: fall linear forwards;
      opacity: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.15); }
    }
    .sparkle {
      position: fixed;
      pointer-events: none;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      animation: sparkFly 0.9s ease-out forwards;
      opacity: 0;
    }
    @keyframes sparkFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>
<div id="scene">
  <div id="prompt">
    <p>Toca para recibir tu regalo de cumpleaños 🎂</p>
    <button id="btn">Abrir regalo</button>
  </div>
  <div id="message">
    <div id="hearts-row">💖 💕 💖</div>
    <h1>¡Feliz cumpleaños,<br>mi amor!</h1>
    <p>En este día tan especial quiero que sepas que eres lo más bonito que me pasó. Te quiero muchísimo. 🌸</p>
    <p style="font-size:14px; color:#b05080;">— Alex 💌</p>
    <button id="replay">Volver a ver</button>
  </div>
</div>

<script>
const emojis = ['🌸','🌺','🌹','💮','🌷','🌼','✨','💗','🌸','💕'];

function spawnPetals() {
  const count = 40;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = (Math.random() * 96) + 'vw';
      p.style.top = '-40px';
      const dur = 2.4 + Math.random() * 2.4;
      p.style.animationDuration = dur + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), dur * 1000 + 100);
    }, i * 100);
  }
}

function spawnSparks(cx, cy) {
  for (let i = 0; i < 16; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const angle = (i / 16) * 2 * Math.PI;
    const dist = 45 + Math.random() * 60;
    s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    const colors = ['#e84393','#ff85c2','#ffd6ec','#ffaadd','#ffffff'];
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 950);
  }
}

document.getElementById('btn').addEventListener('click', function(e) {
  const rect = e.target.getBoundingClientRect();
  spawnSparks(rect.left + rect.width / 2, rect.top + rect.height / 2);
  document.getElementById('prompt').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('prompt').style.display = 'none';
    const msg = document.getElementById('message');
    msg.style.display = 'flex';
    spawnPetals();
  }, 500);
});

document.getElementById('replay').addEventListener('click', function() {
  document.getElementById('message').style.display = 'none';
  const prompt = document.getElementById('prompt');
  prompt.style.display = '';
  prompt.style.opacity = '1';
  spawnPetals();
});
</script>
</body>
</html>
